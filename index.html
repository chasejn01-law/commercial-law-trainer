/* This is mostly intended for prototyping; please download the pattern and re-host for production environments. Thank you! */
      background-size: cover;
      background-attachment: fixed;

      h1, h2 {

      }

    #timerBox {
      position: fixed;
      right: 20px;
      top: 20px;
      background: #dcdcdc;
      color: black;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);

      text-align: center;
    }

    #timer {
      font-size: 36px;
      font-weight: bold;
      margin: 0 0 10px 0;
    }

    #timerBox button {
      margin: 5px;
      padding: 6px 10px;
      cursor: pointer;
    }

    input[type="text"],
    textarea {
      width: 700px;
      box-sizing: border-box;
      font-size: 16px;
      padding: 8px;
      display: block;
      margin-bottom: 15px;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 75px;
      resize: vertical;
    }

    section {
      margin-bottom: 30px;
      
    }

    .answer-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 15px;
    }

    .answer-row textarea {
      margin-bottom: 0;
    }

    .hint-btn {
      padding: 8px 12px;
      cursor: pointer;
      background-color: #eeeeee;
      border: 1px solid #cccccc;
      border-radius: 5px;
      font-size: 14px;
    }

    .hint-btn:hover {
      background-color: #dddddd;
    }


    .autocomplete-btn {
      padding: 8px 12px;
      cursor: pointer;
      background-color: #eeeeee;
      border: 1px solid #cccccc;
      border-radius: 5px;
      font-size: 14px;
    }

    .autocomplete-btn:hover {
      background-color: #dddddd;
    }


    .dictate-btn {
      padding: 8px 12px;
      cursor: pointer;
      background-color: #eeeeee;
      border: 1px solid #cccccc;
      border-radius: 5px;
      font-size: 14px;
    }

    .dictate-btn:hover {
      background-color: #dddddd;
    }

    #enemy {
      width: 120px;
      display: block;
      margin: 10px auto;
    }

    .section-goblin {
      width: 120px;
      display: block;
      margin: 10px auto 20px auto;
    }

    .section-goblin.boss {
      width: 160px;
}

    #hero {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 160px;
      z-index: 1000;
      pointer-events: none;
      animation: floatHero 1.8s ease-in-out infinite;
    }

@keyframes floatHero {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-5px); }
  100% { transform: translateY(0px); }
}
